# git-cliff ~ configuration file
# https://git-cliff.org/docs/configuration

[changelog]
# Body template: group_by(group) for sections, group_by(message) for dedup.
# Uses pr_title when available; replace_regex links #N (preprocessors only run on message).
body = """
## What's Changed

{%- if version %} in {{ version | trim_start_matches(pat="v") }}{%- else %} (since {{ previous.version | default(value="initial") }}){%- endif -%}
{%- for group, group_commits in commits | group_by(attribute="group") %}
### {{ group }}
{% for msg, dupes in group_commits | group_by(attribute="message") -%}
  {%- set commit = dupes | first -%}
  {%- if commit.remote.pr_title -%}
    {%- set commit_message = commit.remote.pr_title -%}
  {%- else -%}
    {%- set commit_message = commit.message -%}
  {%- endif %}
  * {{ commit_message | split(pat="\n") | first | trim | replace_regex(from="(^|[^\\[])#([0-9]+)", to="$1[#$2](https://github.com/NefMoto/NefMotoOpenSource/issues/$2)") }}\
    {%- if commit.remote.username %} by @{{ commit.remote.username }}{% endif -%}
    {%- if commit.remote.pr_number %} in [#{{ commit.remote.pr_number }}]({{ self::remote_url() }}/pull/{{ commit.remote.pr_number }}){% endif %}
{%- endfor -%}
{% raw %}
{% endraw -%}
{%- endfor -%}

{%- if github -%}
{% if github.contributors | filter(attribute="is_first_time", value=true) | length != 0 %}
  {% raw %}\n{% endraw -%}
  ### New Contributors
{%- endif %}\
{% for contributor in github.contributors | filter(attribute="is_first_time", value=true) %}
  * @{{ contributor.username }} made their first contribution
    {%- if contributor.pr_number %} in \
      [#{{ contributor.pr_number }}]({{ self::remote_url() }}/pull/{{ contributor.pr_number }}) \
    {%- endif %}
{%- endfor -%}
{%- endif -%}

{% if version %}
    {% if previous.version %}
      **Full Changelog**: {{ self::remote_url() }}/compare/{{ previous.version }}...{{ version }}
    {% endif %}
{% else -%}
  {% raw %}\n{% endraw %}
{% endif %}

{%- macro remote_url() -%}
  https://github.com/{{ remote.github.owner }}/{{ remote.github.repo }}
{%- endmacro -%}
"""
# Remove leading and trailing whitespaces from the changelog's body.
trim = true
footer = """
<!-- generated by git-cliff -->
"""
[git]
# Parse commits according to the conventional commits specification.
# See https://www.conventionalcommits.org
conventional_commits = true
# Include unconventional commits; do not exclude them.
filter_unconventional = false
# Treat each commit as one; do not split on newlines.
split_commits = false
# Group commits by type (conventional); non-conventional go to "Other".
commit_parsers = [
  # Dependabot first (before [Ff]ix/[Ii]ssue which match "fix"/"issue" in merge messages)
  { message = "^Merge pull request.*dependabot", group = "Dependabot" },
  { message = "^Bump", skip = true },
  { message = "[Cc]rash", group = "Bug Fixes" },
  { message = "[Ff]ix", group = "Bug Fixes" },
  { message = "[Nn]ull", group = "Bug Fixes" },
  { message = "[Ww]orkaround", group = "Bug Fixes" },
  { message = "^[Aa]dd", group = "Features" },
  { message = "^[Rr]emove", group = "Refactor" },
  { message = "^[Ff]eat", group = "Features" },
  { message = "^[Ii]mplement", group = "Features" },
  { message = "[Cc]osmetic", group = "Styling" },
  { message = "[Ii]ndent", group = "Styling" },
  { message = "[Ww]hitespace", group = "Styling" },
  { message = "README", group = "Documentation" },
  { message = "\\.md", group = "Documentation" },
  { message = "^doc", group = "Documentation" },
  { message = "^refactor", group = "Refactor" },
  { message = "^perf", group = "Performance" },
  { message = "^chore", group = "Chore" },
  { message = "^cosmetic", group = "Chore" },
  { message = "^style", group = "Styling" },
  { message = "^test", group = "Testing" },
  # put last as a fallthru for "issues"
  { message = "[Ii]ssue", group = "Bug Fixes" },
  { message = ".*", group = "Other" },
]
# Rewrite commit messages before display: (#123) → link; bare #123 → link (avoids matching inside [...])
commit_preprocessors = [
  { pattern = '\\(#([0-9]+)\\)', replace = "([#$1](https://github.com/NefMoto/NefMotoOpenSource/issues/$1))" },
  { pattern = "(^|[^\\[])#([0-9]+)", replace = "$1[#$2](https://github.com/NefMoto/NefMotoOpenSource/issues/$2)" },
]
# Include commits that do not match any commit_parser (they go to "Other").
filter_commits = false
# Order releases topologically instead of chronologically.
topo_order = false
# Order of commits in each group/release within the changelog.
# Allowed values: newest, oldest
sort_commits = "newest"
# Match only stable tags (v1.9.6.0). RC tags (v1.9.6.0-rc3) are ignored.
#   -l / --latest: changelog for latest stable release
#   --unreleased: commits since last stable
tag_pattern = "^v[0-9]+\\.[0-9]+\\.[0-9]+\\.[0-9]+$"
