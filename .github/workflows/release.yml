name: Release

env:
  WIX_VERSION: '6.0.2'

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to build (e.g., v1.1.1.1 or v1.1.1.1-rc1)'
        required: true

jobs:
  build-and-release:
    runs-on: windows-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v6
      with:
        ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref }}
        fetch-depth: 0  # Fetch all history for git describe

    - name: Determine tag and release type
      id: release
      shell: bash
      run: |
        if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
          tag="${{ inputs.tag }}"
        elif [ "${{ github.event_name }}" = "push" ]; then
          tag="${{ github.ref_name }}"
        else
          tag=$(git describe --tags --exact-match HEAD 2>/dev/null)
          if [ -z "$tag" ]; then
            echo "Error: Could not determine tag from ref: ${{ github.ref }}"
            exit 1
          fi
        fi

        # Check if tag contains a hyphen followed by letters/numbers (e.g., -rc1, -beta, -alpha, etc.)
        # This matches pre-release tags like v1.9.4.4-rc2, v1.0.0-beta, etc.
        if echo "$tag" | grep -qE -- '-[a-zA-Z0-9]+'; then
          isPrerelease="true"
        else
          isPrerelease="false"
        fi

        # Find previous stable tag (no hyphen) reachable from this tag
        prev_tag=$(git describe --tags --match 'v[0-9]*' --abbrev=0 "${tag}^" 2>/dev/null || true)
        if [ -z "$prev_tag" ]; then
          echo "Error: Could not find previous stable tag before $tag"
          exit 1
        fi

        echo "tag=$tag" >> $GITHUB_OUTPUT
        echo "prerelease=$isPrerelease" >> $GITHUB_OUTPUT
        echo "prev_tag=$prev_tag" >> $GITHUB_OUTPUT
        echo "Building for tag: $tag (prerelease: $isPrerelease, previous: $prev_tag)"

    - name: Setup .NET
      uses: actions/setup-dotnet@v5
      with:
        dotnet-version: '8.0.x'

    - name: Setup Python
      uses: actions/setup-python@v6
      with:
        python-version: '3.x'

    - name: Install WiX Toolset
      run: |
        dotnet tool install --global wix --version ${{ env.WIX_VERSION }}
        wix extension add WixToolset.UI.wixext/${{ env.WIX_VERSION }} WixToolset.NetFx.wixext/${{ env.WIX_VERSION }} --global
      shell: pwsh

    - name: Build Release
      run: make release
      shell: bash

    - name: Test
      run: make test CONFIG=Release
      shell: bash

    - name: Build installer
      env:
        # NEVER export VERSION, the SDK will use it (incorrectly), expecting a sanitized version like "1.2.3.4"
        FULL_VERSION: ${{ steps.release.outputs.tag }}
      run: make installer
      shell: bash

    - name: Install git-cliff
      uses: kenji-miyake/setup-git-cliff@v2
      with:
        target-platform: x86_64-pc-windows-msvc
        archive-extension: zip

    - name: Find MSI file
      id: find_msi
      shell: pwsh
      run: |
        $msi = Get-ChildItem -Path "Installer/bin/Release" -Filter "NefMotoECUFlasher-*.msi" | Select-Object -First 1
        if (-not $msi) {
          Write-Error "MSI file not found in Installer/bin/Release"
          exit 1
        }
        # Get relative path using forward slashes (works on Windows too)
        $workspace = $env:GITHUB_WORKSPACE
        $fullPath = $msi.FullName
        $relativePath = $fullPath -replace [regex]::Escape($workspace), '' -replace '^\\', '' -replace '\\', '/'
        echo "msi_path=$relativePath" >> $env:GITHUB_OUTPUT
        echo "msi_name=$($msi.Name)" >> $env:GITHUB_OUTPUT
        Write-Host "Found MSI: $($msi.Name) at $relativePath"
        Write-Host "Full path: $fullPath"

    - name: Generate release notes with MSI link
      id: release_notes
      shell: bash
      run: |
        tag="${{ steps.release.outputs.tag }}"
        msiName="${{ steps.find_msi.outputs.msi_name }}"
        msiUrl="https://github.com/${{ github.repository }}/releases/download/${tag}/${msiName}"
        prev_tag="${{ steps.release.outputs.prev_tag }}"
        prerelease="${{ steps.release.outputs.prerelease }}"

        # Generate changelog with git-cliff: stable uses -l (since previous stable), RC uses explicit range
        if [ "$prerelease" = "true" ]; then
          releaseBody=$(git cliff "$prev_tag..$tag")
        else
          releaseBody=$(git cliff -l)
        fi

        # Fallback if git-cliff produced nothing
        if [ -z "$releaseBody" ]; then
          releaseBody="## What's Changed"$'\n'$'\n'"Release ${tag}"
        fi

        # Append MSI download link
        releaseBody="${releaseBody}"$'\n'$'\n'"## Downloads"$'\n'$'\n'"📦 [Download Installer](${msiUrl}) (${msiName})"

        # Multiline output for GITHUB_OUTPUT
        {
          echo "body<<EOF"
          echo "$releaseBody"
          echo "EOF"
        } >> $GITHUB_OUTPUT

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v3
      with:
        files: ${{ steps.find_msi.outputs.msi_path }}
        tag_name: ${{ steps.release.outputs.tag }}
        prerelease: ${{ steps.release.outputs.prerelease == 'true' }}
        draft: false
        body: ${{ steps.release_notes.outputs.body }}
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
